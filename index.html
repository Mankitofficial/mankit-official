<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mankit Official Platform</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    background:#f4f4f4;
}

/* SPLASH SCREEN */

#splash-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:linear-gradient(to bottom,#02153b,#003ed1);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition:1s ease;
}

.logo-text{
    font-size:85px;
    color:#d4af37;
    letter-spacing:10px;
    font-family:'Playfair Display',serif;
    opacity:0;
    transform:translateY(30px);
    animation:logoAnimation 3s ease forwards;
}

/* MAIN CONTENT */

#main-content{
    display:none;
    opacity:0;
    animation:fadeContent 1.5s ease forwards;
}

/* HERO SECTION */

.hero{
    height:320px;
    background:linear-gradient(135deg,#005eff,#00bfff);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:20px;
}

.hero h1{
    font-size:70px;
    font-family:'Playfair Display',serif;
    font-weight:700;
    margin-bottom:10px;
}

.hero p{
    font-size:24px;
    font-weight:300;
}

/* WELCOME CARD */

.welcome-container{
    padding:40px 20px;
}

.welcome-box{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:35px;
    padding:45px;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);
}

.welcome-box h2{
    color:#d4af37;
    font-size:60px;
    font-family:'Playfair Display',serif;
    margin-bottom:25px;
}

.welcome-box p{
    font-size:24px;
    line-height:1.9;
    color:#222;
}

/* ANIMATIONS */

@keyframes logoAnimation{
    0%{
        opacity:0;
        transform:translateY(40px);
        letter-spacing:25px;
    }

    100%{
        opacity:1;
        transform:translateY(0);
        letter-spacing:10px;
    }
}

@keyframes fadeContent{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */

@media(max-width:768px){

    .logo-text{
        font-size:58px;
        letter-spacing:6px;
    }

    .hero{
        height:280px;
    }

    .hero h1{
        font-size:52px;
    }

    .hero p{
        font-size:18px;
    }

    .welcome-box{
        padding:35px 28px;
        border-radius:28px;
    }

    .welcome-box h2{
        font-size:45px;
    }

    .welcome-box p{
        font-size:19px;
        line-height:1.8;
    }

}

</style>
</head>

<body>

<!-- SPLASH SCREEN -->

<div id="splash-screen">
    <h1 class="logo-text">MANKIT</h1>
</div>

<!-- MAIN WEBSITE -->

<div id="main-content">

    <!-- HERO -->

    <section class="hero">

        <h1>Mankit</h1>

        <p>
            Official Personal & Professional Portal
        </p>

    </section>

    <!-- WELCOME -->

    <section class="welcome-container">

        <div class="welcome-box">

            <h2>Welcome</h2>

            <p>
                Welcome to my official digital space.
                This platform reflects my journey,
                values, and continuous effort to
                grow with discipline and honest intent.
            </p>

        </div>

    </section>

</div>

<script>

/* SPLASH SCREEN CONTROL */

setTimeout(() => {

    document.getElementById("splash-screen").style.opacity = "0";
    document.getElementById("splash-screen").style.visibility = "hidden";

    document.getElementById("main-content").style.display = "block";

    document.body.style.overflow = "auto";

}, 3000);

</script>

</body>
</html>
